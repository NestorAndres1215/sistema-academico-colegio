<div class="d-flex align-items-center justify-content-center gap-2 my-5 flex-nowrap">
  <button
    class="btn d-flex align-items-center justify-content-center gap-2 px-4 py-3 fw-semibold  bg-white border rounded-4 shadow-sm prev"
    (click)="prev()" [disabled]="page === 1" [class.disabled]="page === 1">
    <i class="fas fa-chevron-left"></i>
    Anterior
  </button>

  <div class="page-info">
    <span class="current-page">{{ page }}</span>
    <span class="separator">/</span>
    <span class="total-pages">{{ totalPages }}</span>
  </div>

  <button
    class="btn d-flex align-items-center justify-content-center gap-2 px-4 py-3 fw-semibold  bg-white border rounded-4 shadow-sm next"
    (click)="next()" [disabled]="page === totalPages" [class.disabled]="page === totalPages">
    Siguiente
    <i class="fas fa-chevron-right"></i>
  </button>
</div>
