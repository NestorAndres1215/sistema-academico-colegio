<div class="container my-4">

    <app-tittle title="Restablecer Contraseña" icon="fas fa-key"></app-tittle>

    <div class="bg-white p-4 rounded-4 shadow-sm border mb-4">

        <form [formGroup]="form"  (ngSubmit)="operar()"class="row g-4">

            <div class="col-md-6">
                <div class="input-group input-group-lg">
                    <span class="input-group-text">
                        <i class="fas fa-envelope icon"></i>
                    </span>
                    <input type="email" class="form-control py-3 px-4" placeholder="Email" formControlName="email"
                        [disabled]="true">
                </div>
            </div>

            <div class="col-md-6">
                <div class="input-group input-group-lg">

                    <span class="input-group-text">
                        <i class="fas fa-lock icon"></i>
                    </span>

                    <input [type]="showCurrentPassword ? 'text' : 'password'" class="form-control py-3 px-4"
                        placeholder="Contraseña actual" formControlName="currentPassword">

                    <span class="input-group-text" (click)="toggleCurrentPassword()" style="cursor: pointer;">
                        <i class="fas icon" [ngClass]="showCurrentPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
                    </span>

                </div>
            </div>

            <div class="col-md-6">
                <div class="input-group input-group-lg">
                    <span class="input-group-text">
                        <i class="fas fa-lock icon"></i>
                    </span>
                    <input [type]="showNewPassword ? 'text' : 'password'" class="form-control py-3 px-4"
                        placeholder="Nueva contraseña" formControlName="newPassword">

                    <span class="input-group-text" (click)="toggleNewPassword()" style="cursor: pointer;">
                        <i class="fas icon" [ngClass]="showNewPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
                    </span>
                </div>
            </div>

            <div class="col-md-6">
                <div class="input-group input-group-lg">
                    <span class="input-group-text">
                        <i class="fas fa-lock icon"></i>
                    </span>
                    <input [type]="showConfirmPassword ? 'text' : 'password'" class="form-control py-3 px-4"
                        placeholder="Confirmar contraseña" formControlName="confirmNewPassword">

                    <span class="input-group-text" (click)="toggleConfirmPassword()" style="cursor: pointer;">
                        <i class="fas icon" [ngClass]="showConfirmPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
                    </span>
                </div>
            </div>

            <div class="col-12">
                <app-button icon="fas fa-save" label="Actualizar contraseña" color="principal">
                </app-button>
            </div>

        </form>
    </div>
</div>
