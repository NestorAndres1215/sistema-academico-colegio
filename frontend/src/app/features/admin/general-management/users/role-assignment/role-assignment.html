<div class="container my-4 pb-5">
  <app-page-title  title="Listado de Roles" icon="fas fa-user-shield">
  </app-page-title>

  <app-filter-search (searchChange)="filter($event)">
  </app-filter-search>

  <app-data-table [columns]="columns" [data]="rolePaginated">
  </app-data-table>

  <app-pagination [page]="pageActivos" [totalPages]="totalPages" (pageChange)="onPageChange($event)">
  </app-pagination>
</div>
