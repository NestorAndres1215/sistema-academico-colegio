<div class="container my-4 pb-5">
  <app-tittle title="Listado de Roles" icon="fas fa-user-shield">
  </app-tittle>

  <app-search (searchChange)="filter($event)">
  </app-search>

  <app-table [columns]="columns" [data]="rolePaginated">
  </app-table>

  <app-pagination [page]="pageActivos" [totalPages]="totalPages" (pageChange)="onPageChange($event)">
  </app-pagination>
</div>
