<div class="container my-4">

    <app-page-title title="Registro de Teacher" icon="fas fa-chalkboard-teacher"></app-page-title>

    <div class="bg-white p-4 rounded-4 shadow-sm border mb-4">

        <form [formGroup]="form" (ngSubmit)="operar()" class="row g-4">

            <div class="col-md-6">
                <label class="form-label">Nombres</label>
                <input class="form-control py-3 px-4" formControlName="firstName">
            </div>

            <div class="col-md-6">
                <label class="form-label">Segundo Nombre</label>
                <input class="form-control py-3 px-4" formControlName="middleName">
            </div>

            <div class="col-md-6">
                <label class="form-label">Apellido Paterno</label>
                <input class="form-control py-3 px-4" formControlName="paternalLastName">
            </div>

            <div class="col-md-6">
                <label class="form-label">Apellido Materno</label>
                <input class="form-control py-3 px-4" formControlName="maternalLastName">
            </div>

            <div class="col-md-6">
                <label class="form-label">DNI</label>
                <input class="form-control py-3 px-4" formControlName="dni">
            </div>

            <div class="col-md-6">
                <label class="form-label">Teléfono</label>
                <input class="form-control py-3 px-4" formControlName="phone">
            </div>

            <div class="col-md-6">
                <label class="form-label">Correo electrónico</label>
                <input type="email" class="form-control py-3 px-4" formControlName="email">
            </div>

            <div class="col-md-6">
                <label class="form-label">Contraseña</label>
                <input type="password" class="form-control py-3 px-4" formControlName="password">
            </div>

            <div class="col-md-6">
                <label class="form-label">Género</label>
                <select class="form-select py-3 px-4" formControlName="gender">
                    <option value="" disabled>Seleccionar género</option>
                    <option value="M">Masculino</option>
                    <option value="F">Femenino</option>
                    <option value="O">Otro</option>
                </select>
            </div>

            <div class="col-md-6">
                <label class="form-label">Nacionalidad</label>
                <input class="form-control py-3 px-4" formControlName="nationality">
            </div>

            <div class="col-md-6">
                <label class="form-label">Fecha de nacimiento</label>
                <input type="date" class="form-control py-3 px-4" formControlName="birthDate">
            </div>

            <div class="col-md-6">
                <label class="form-label">Especialización</label>
                <input class="form-control py-3 px-4" formControlName="specialization">
            </div>

            <div class="col-md-6">
                <label class="form-label">Fecha de contratación</label>
                <input type="date" class="form-control py-3 px-4" [max]="maxBirthDate" formControlName="hireDate">
            </div>

            <div class="col-md-6">
                <label class="form-label">Foto de perfil</label>
                <input type="file" class="form-control py-3 px-4" (change)="onFileSelected($event)" accept="image/*">
            </div>

            <div class="col-12">
                <app-button icon="fas fa-save" label="Registrar" color="principal"></app-button>
            </div>

        </form>

    </div>
</div>
